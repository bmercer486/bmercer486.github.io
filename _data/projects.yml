- title: "Multiscale Finite Element Modeling"
  image: "/assets/images/multiscale-fea.png"
  description: >
    I have done work exploring implementation of finite element models which use fine-scaling modeling 
    of representative volume elements (RVEs) to homogenize material behavior and obtain cost-efficient solutions
