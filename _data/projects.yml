- title: "Atomistic models of Kevlar fibers"
  image: "/assets/images/kevlar.png"
  description: >
    Kevlar polymer fibers consist of aligned polymer chains and have a high degree of crystallinity. My Ph.D. dissertation work focused
    on characterizing the structure-property relationships in Kevlar fibers using atomstic level modeling of fiber microstructure and 
    the material's behavior under a variety of loading conditions.
  links:
    - name: Paper 1
      url: https://www.sciencedirect.com/science/article/abs/pii/S0032386117302598
    - name: Paper 2
      url: https://www.sciencedirect.com/science/article/abs/pii/S0032386117309102

- title: "Additive manufacturing"
  image: "/assets/images/meltpool.png"
  description: >
    As a research engineer, I developed a computational model for melting and solification in selective laser melting of metal powder beds.
    The model was used to optimize laser scanning protocols to achieve target material properties for a given part.
  links:
    - name: Paper 1
      url: https://www.sciencedirect.com/science/article/pii/S0264127520306523
